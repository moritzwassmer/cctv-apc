_target_: napc.model.NAPC
defaults:
- base_model
- input: conv_baseline
- intermediate: xlstm
- output: dense

# Overwrite the embedding_dim for all components
input:
  embedding_dim: 256
intermediate:
  config:
    embedding_dim: 256
    num_blocks: 2
    slstm_at:
      - 0
      - 1
    slstm_block:
      slstm:
        backend: cuda
output:
  embedding_dim: 256
