_target_: napc.model.NAPC
defaults:
- base_model
- input: conv_baseline
- output: dense

# Overwrite the embedding_dim for all components
input:
  embedding_dim: 130
output:
  embedding_dim: 70
intermediate:
  _target_: napc.model.LSTMModule
  _convert_: all
  embedding_dims: 
  - 130
  - 100
  - 70
  dropout: 0.2