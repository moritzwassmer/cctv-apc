_target_: napc.model.ConvInput
_convert_: all

input_dimensions: ${run.model.input_dimensions}
embedding_dim: -1

conv_filters: [8, 16, 32]

conv_kernel: 
  - [1, 2, 2]
  - [1, 2, 2]
  - [1, 2, 2]

conv_pad: 
  - [0, 1, 1]
  - [0, 1, 1]
  - [0, 1, 1]

conv_stride: 
  - [1, 1, 1]
  - [1, 1, 1]
  - [1, 1, 1]

pool_kernel: 
  - [1, 2, 2]
  - [1, 2, 2]
  - [1, 2, 2]

pool_stride: 
  - [1, 2, 2]
  - [1, 2, 2]
  - [1, 2, 2]

pool_pad: 
  - [0, 0, 0]
  - [0, 0, 0]
  - [0, 0, 0]

conv_pool_layer: 3

use_batchnorm: true
use_groupnorm: false
