_target_: napc.model.NAPC
defaults:
- base_model
- input: conv_baseline
- output: dense

# Overwrite the embedding_dim for all components
input:
  embedding_dim: 128
output:
  embedding_dim: 128
intermediate:
  _target_: napc.model.mLSTMModule
  num_blocks: 2
  embedding_dim: 128
  num_heads: 4
  chunkwise_kernel: chunkwise--native_autograd
  chunk_size: 64