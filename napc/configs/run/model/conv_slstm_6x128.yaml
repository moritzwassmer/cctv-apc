_target_: napc.model.NAPC
defaults:
- base_model
- input: conv_baseline
- intermediate: xlstm
- output: dense

# Overwrite the embedding_dim for all components
input:
  embedding_dim: 128
intermediate:
  config:
    embedding_dim: 128
    num_blocks: 6
    slstm_at:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5 
    slstm_block:
      slstm:
        backend: cuda
output:
  embedding_dim: 128
