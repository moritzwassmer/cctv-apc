defaults:
  - run: test_run
  - override hydra/launcher: submitit_slurm

hydra: 
  run:
    dir: ./hydra #/work/wassmer/napc_xlstm/output/hydra/single_run/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ./hydra #/work/wassmer/napc_xlstm/output/hydra/multi_run/${now:%Y-%m-%d_%H-%M-%S}
  launcher:
    # @package hydra.launcher
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    timeout_min: 10
    cpus_per_task: 4
    gpus_per_node: 0
    tasks_per_node: 1
    mem_gb: 64  
    nodes: 1
    name: ${run.trainer.logger.experiment_name} #${hydra.job.name}
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
    partition: null #gpu
    qos: null
    comment: null
    constraint: null
    exclude: null
    gres: null #"gpu:1,gpu_mem:6G,ccc:60" # "gpu:1,gpu_mem:12G,ccc:80"
    cpus_per_gpu: null
    gpus_per_task: null
    mem_per_gpu: null
    mem_per_cpu: null
    account: null
    signal_delay_s: 120
    max_num_timeout: 0
    additional_parameters: {}
    array_parallelism: 256
    setup: null
    #srun_args: null